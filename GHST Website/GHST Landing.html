<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GHST — The Ghana Cedi, onchain</title>
<link rel="icon" type="image/png" href="assets/favicon-96x96.png" sizes="96x96" />
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles/colors_and_type.css" />
<link rel="stylesheet" href="styles/site.css" />
</head>
<body data-density="airy">
  <div id="root"></div>
  <script>window.BASESCAN_API_KEY = "NUN17UI6YIPYT759MNASJWFU1FJGNJKAQU";</script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Icons.jsx"></script>
  <script type="text/babel" src="components/Onchain.jsx"></script>
  <script type="text/babel" src="components/Sections1.jsx"></script>
  <script type="text/babel" src="components/Sections2.jsx"></script>
  <script type="text/babel" src="components/Economy.jsx"></script>
  <script type="text/babel" src="components/Sections3.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "balanced",
      "hero": "orb"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = useState(DEFAULTS);

      useEffect(() => {
        document.body.dataset.density = tweaks.density;
      }, [tweaks]);

      // Scroll reveal
      useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.08 });
        document.querySelectorAll('.reveal').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);

      return (
        <>
          <Nav />
          <main>
            <Hero />
            <PartnerStrip />
            <TrustGrid />
            <HowItWorks />
            <Economy />
            <Reserves />
            <StatsStrip />
            <Multichain />
            <Developers />
            <FAQ />
            <CTA />
          </main>
          <Footer />
          <Tweaks tweaks={tweaks} onChange={setTweaks} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
