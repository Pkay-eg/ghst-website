<style>
/* ─────────────────────────────────────────────────────────────
   Kairos Design System — Colors & Type
   Source: Figma "Kairos.fig" (Logo & Stylescape)
   ───────────────────────────────────────────────────────────── */

/* ─── FONTS ─────────────────────────────────────────────────────
   Brand fonts are PP Mori (display, semibold/bold) and PP Neue
   Montreal (display + UI). Both are commercial Pangram Pangram
   fonts and not on Google Fonts. Until licensed font files are
   provided, we substitute the closest free matches:
     PP Mori          → "General Sans"   (Fontshare / GP)
     PP Neue Montreal → "Manrope"        (Google Fonts) [+ for body]
     Manrope          → "Manrope"        (Google Fonts) ✓ exact
   ──────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap');
@import url('https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap');

/* ─── Licensed PP Neue Montreal (uploaded) ─── */
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-Light.otf") format("opentype");
  font-weight: 300; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-LightItalic.otf") format("opentype");
  font-weight: 300; font-style: italic; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-Regular.otf") format("opentype");
  font-weight: 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-Italic.otf") format("opentype");
  font-weight: 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-Medium.otf") format("opentype");
  font-weight: 500; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-MediumItalic.otf") format("opentype");
  font-weight: 500; font-style: italic; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-Bold.otf") format("opentype");
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: "Neue Montreal";
  src: url("./fonts/NeueMontreal-BoldItalic.otf") format("opentype");
  font-weight: 700; font-style: italic; font-display: swap;
}

:root {
  /* ─── BRAND COLORS (named per Figma stylescape) ─── */
  --kairos-sherwood:    #053f33;   /* primary — deep forest green */
  --kairos-spring-wood: #faf8ec;   /* primary cream / parchment */
  --kairos-norway:      #9fcd9f;   /* soft sage */
  --kairos-jade:        #13a96a;   /* vibrant action green */
  --kairos-congress:    #065194;   /* deep blue */
  --kairos-cello:       #1a395e;   /* navy */
  --kairos-jagged-ice:  #c6e7ec;   /* pale aqua */
  --kairos-coral-red:   #ff3c40;   /* alert red */
  --kairos-tangerine:   #ffa16d;   /* warm accent */
  --kairos-mexican-red: #9c232c;   /* deep red */

  --kairos-black:       #000000;
  --kairos-ink:         #1e1815;   /* near-black with warmth */
  --kairos-white:       #ffffff;

  /* ─── SEMANTIC SURFACES ─── */
  --bg:               var(--kairos-spring-wood);
  --bg-inverse:       var(--kairos-sherwood);
  --bg-elevated:      var(--kairos-white);
  --bg-subtle:        #f3f1e6;       /* spring-wood -2 */
  --bg-overlay:       rgba(255,255,255,0.29);  /* glass / scrim */

  /* ─── TEXT ─── */
  --fg:               var(--kairos-ink);
  --fg-muted:         #5b5651;
  --fg-subtle:        #8a857f;
  --fg-on-dark:       var(--kairos-spring-wood);
  --fg-on-dark-muted: rgba(250,248,236,0.72);
  --fg-brand:         var(--kairos-sherwood);
  --fg-accent:        var(--kairos-jade);

  /* ─── BORDERS / LINES ─── */
  --line:             rgba(30,24,21,0.12);
  --line-strong:      rgba(30,24,21,0.24);
  --line-on-dark:     rgba(250,248,236,0.18);
  --hairline:         var(--kairos-black);  /* 1.6px black hairlines used in stylescape */

  /* ─── STATUS ─── */
  --success:          var(--kairos-jade);
  --danger:           var(--kairos-coral-red);
  --warning:          var(--kairos-tangerine);
  --info:             var(--kairos-congress);

  /* ─── TYPE FAMILIES ─── */
  --font-display:     "General Sans", "PP Mori", ui-sans-serif, system-ui, sans-serif;
  --font-sans:        "Neue Montreal", "PP Neue Montreal", "Manrope", ui-sans-serif, system-ui, sans-serif;
  --font-body:        "Neue Montreal", "Manrope", ui-sans-serif, system-ui, sans-serif;
  --font-mono:        ui-monospace, "SF Mono", Menlo, monospace;

  /* ─── TYPE SCALE (px @ 1rem=16) ─── */
  /* Display — Neue Montreal Medium, very tight tracking */
  --t-display-xl:     clamp(72px, 9vw, 164px);  /* hero */
  --t-display-lg:     clamp(56px, 7vw, 112px);  /* section opener */
  --t-display-md:     clamp(40px, 5vw, 72px);
  --t-display-sm:     clamp(32px, 4vw, 56px);
  /* Headline */
  --t-h1:             40px;
  --t-h2:             32px;
  --t-h3:             26px;
  --t-h4:             20px;
  /* Body */
  --t-body-lg:        18px;
  --t-body:           16px;
  --t-body-sm:        14px;
  --t-caption:        12px;
  --t-eyebrow:        13px;  /* tracked uppercase label */

  /* ─── TYPE TOKENS ─── */
  --tracking-display: -0.03em;   /* PP Mori bold: -3% */
  --tracking-tight:   -0.01em;
  --tracking-normal:  0;
  --tracking-wide:    0.04em;    /* eyebrow / labels */
  --tracking-button:  0.083em;   /* CTA: 1.668px @ 20px */

  --leading-display:  1.0;
  --leading-snug:     1.07;
  --leading-normal:   1.5;
  --leading-relaxed:  1.55;

  --weight-regular:   400;
  --weight-medium:    500;
  --weight-semibold:  600;
  --weight-bold:      700;

  /* ─── RADII ─── */
  --r-xs:   8px;
  --r-sm:   16px;
  --r-md:   26px;       /* card inner */
  --r-lg:   40px;       /* card */
  --r-xl:   50px;       /* large card */
  --r-pill: 999px;      /* button / chip / orb */

  /* ─── SPACING (4-pt base) ─── */
  --s-1:  4px;  --s-2:  8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 20px;  --s-6: 24px;  --s-7: 32px; --s-8: 40px;
  --s-9: 48px;  --s-10: 64px; --s-11: 80px; --s-12: 96px;

  /* ─── ELEVATION ─── */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 4px 12px rgba(5,63,51,0.06);
  --shadow-md: 0 10px 30px rgba(5,63,51,0.08);
  --shadow-lg: 0 24px 60px rgba(5,63,51,0.14);
  --shadow-glow: 0 0 60px rgba(5,63,51,0.22);

  /* ─── MOTION ─── */
  --ease-out:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-soft:   cubic-bezier(0.4, 0, 0.2, 1);
  --dur-fast:    160ms;
  --dur:         260ms;
  --dur-slow:    520ms;
  --dur-pause:   900ms;   /* the brand "breath" */
}

/* ─── BASE ELEMENT TYPOGRAPHY ───────────────────────────────── */

html { font-family: var(--font-body); color: var(--fg); background: var(--bg); }
body { margin: 0; font-size: var(--t-body); line-height: var(--leading-normal); -webkit-font-smoothing: antialiased; }

h1, .h1 {
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  font-size: var(--t-display-md);
  line-height: var(--leading-display);
  letter-spacing: var(--tracking-tight);
  margin: 0;
}
h2, .h2 {
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  font-size: var(--t-h1);
  line-height: var(--leading-display);
  letter-spacing: var(--tracking-tight);
  margin: 0;
}
h3, .h3 {
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  font-size: var(--t-h3);
  line-height: 1.1;
  letter-spacing: var(--tracking-tight);
  margin: 0;
}
h4, .h4 {
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  font-size: var(--t-h4);
  line-height: 1.2;
  letter-spacing: var(--tracking-tight);
  margin: 0;
}

p, .body { font-size: var(--t-body); line-height: var(--leading-normal); margin: 0; }
small, .caption { font-size: var(--t-caption); line-height: 1.4; color: var(--fg-muted); }

.display-xl { font-family: var(--font-sans); font-weight: 500; font-size: var(--t-display-xl); line-height: var(--leading-display); letter-spacing: var(--tracking-display); }
.display-lg { font-family: var(--font-display); font-weight: 700; font-size: var(--t-display-lg); line-height: var(--leading-snug); letter-spacing: var(--tracking-display); }
.display-md { font-family: var(--font-sans); font-weight: 500; font-size: var(--t-display-md); line-height: var(--leading-display); letter-spacing: var(--tracking-tight); }

.eyebrow {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--t-eyebrow);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--fg-muted);
}

.serif-quote {
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: var(--t-h2);
  line-height: 1.15;
  letter-spacing: var(--tracking-tight);
}

</style>
<style>
/* ─── GHST — Corporate. Inter Tight. White + #785AFF. ─── */

@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800&display=swap');

:root {
  --purple: #785AFF;
  --purple-deep: #5d3fe6;
  --purple-darker: #4326c9;
  --purple-soft: #f5f3ff;
  --purple-tint: #ebe5ff;
  --purple-border: #e0d8ff;

  --white: #ffffff;
  --ink: #0a0822;          /* deep, slightly violet */
  --ink-2: #1c1a3a;
  --muted: #555274;
  --subtle: #8c89a8;
  --line: rgba(10,8,34,0.08);
  --line-strong: rgba(10,8,34,0.14);
  --bg-tint: #fafaff;
  --positive: #16a34a;
  --warn: #d97706;

  --shadow-xs: 0 1px 2px rgba(10,8,34,0.04);
  --shadow-sm: 0 2px 8px rgba(10,8,34,0.05);
  --shadow-md: 0 8px 24px rgba(10,8,34,0.08);
  --shadow-lg: 0 24px 56px rgba(10,8,34,0.10);
  --shadow-purple: 0 12px 28px rgba(120,90,255,0.22);

  --font: "Inter Tight", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;

  /* compat aliases (kept so old refs don't error) */
  --ghst-green: var(--purple);
  --ghst-cream: var(--white);
  --ghst-ink: var(--ink);
  --ghst-subtle: var(--purple-soft);

  --container: 1240px;
  --gutter: clamp(20px, 4vw, 40px);

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;

  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --dur: 220ms;
}

* { box-sizing: border-box; }
html, body {
  background: var(--white); color: var(--ink);
  font-family: var(--font);
  font-feature-settings: "cv11", "ss01", "ss03";
}
body {
  margin: 0;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

* { font-family: var(--font); }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

.container { max-width: var(--container); margin: 0 auto; padding-inline: var(--gutter); }

/* ────────── NAV ────────── */
.nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.85);
  backdrop-filter: saturate(1.4) blur(16px);
  -webkit-backdrop-filter: saturate(1.4) blur(16px);
  border-bottom: 1px solid var(--line);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
}
.nav-logo {
  display: inline-flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 18px;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.nav-logo-mark {
  width: 30px; height: 30px; border-radius: 7px;
  background: url("assets/apple-touch-icon.png") center/cover no-repeat;
  flex-shrink: 0;
}
.nav-logo-mark::after { content: none; }
.nav-links {
  display: flex; gap: 32px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink-2);
}
.nav-links a { transition: color var(--dur) var(--ease-out); }
.nav-links a:hover { color: var(--purple); }
.nav-actions { display: flex; align-items: center; gap: 12px; }
.nav-link-secondary {
  font-size: 14px; font-weight: 500; color: var(--ink-2);
  white-space: nowrap;
}
.nav-link-secondary:hover { color: var(--purple); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px;
  border-radius: var(--r-md);
  background: var(--ink); color: #fff;
  font-weight: 500; font-size: 14px;
  white-space: nowrap;
  transition: background var(--dur) var(--ease-out), transform 120ms var(--ease-out);
}
.nav-cta:hover { background: var(--purple); }
.nav-cta:active { transform: scale(0.97); }

@media (max-width: 900px) { .nav-links { display: none; } }

/* ────────── BUTTONS ────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 22px;
  border-radius: var(--r-md);
  font-weight: 500; font-size: 15px;
  border: 1px solid transparent;
  cursor: pointer;
  letter-spacing: -0.01em;
  white-space: nowrap;
  transition: background var(--dur) var(--ease-out), color var(--dur) var(--ease-out), border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out), transform 120ms var(--ease-out);
}
.btn:active { transform: scale(0.985); }
.btn-primary {
  background: var(--purple); color: #fff;
  box-shadow: var(--shadow-purple);
}
.btn-primary:hover { background: var(--purple-deep); box-shadow: 0 16px 32px rgba(120,90,255,0.3); }
.btn-ink { background: var(--ink); color: #fff; }
.btn-ink:hover { background: #000; }
.btn-ghost {
  background: var(--white); color: var(--ink);
  border-color: var(--line-strong);
}
.btn-ghost:hover { border-color: var(--ink); }
.btn-cream { background: var(--white); color: var(--purple); }
.btn-cream:hover { background: var(--purple-soft); }
.btn-outline-cream { background: transparent; color: var(--white); border-color: rgba(255,255,255,0.45); }
.btn-outline-cream:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
.btn-sm { padding: 8px 14px; font-size: 13px; }

/* ────────── EYEBROWS ────────── */
.eyebrow-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 10px;
  border-radius: 999px;
  background: var(--purple-soft);
  border: 1px solid var(--purple-border);
  font-size: 12px; color: var(--purple);
  font-weight: 500; letter-spacing: 0;
  white-space: nowrap;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 999px;
  background: var(--positive);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
  animation: live-pulse 2.2s var(--ease-out) infinite;
  flex-shrink: 0;
}
@keyframes live-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.5); }
  70% { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
}
.eyebrow-label {
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
}

/* ────────── TYPOGRAPHY ────────── */
.display {
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 1.02;
  color: var(--ink);
}
.display-xl { font-size: clamp(44px, 5.8vw, 78px); font-weight: 500; }
.display-lg { font-size: clamp(36px, 4.6vw, 60px); font-weight: 500; }
.display-md { font-size: clamp(28px, 3.4vw, 44px); font-weight: 500; line-height: 1.08; }
.display em { font-style: normal; color: var(--purple); }
.lede {
  font-size: clamp(16px, 1.2vw, 19px);
  line-height: 1.55;
  color: var(--muted);
  font-weight: 400;
}

/* ────────── SECTIONS ────────── */
.section { padding-block: clamp(72px, 9vw, 120px); }
.section-tight { padding-block: clamp(48px, 6vw, 72px); }
.section-dark {
  background: var(--ink);
  color: #fff;
  position: relative;
}
.section-dark .display { color: #fff; }
.section-dark .display em { color: var(--purple); }
.section-dark .eyebrow-label { color: rgba(255,255,255,0.6); }
.section-dark .lede { color: rgba(255,255,255,0.7); }
.section-tint { background: var(--bg-tint); }

/* ────────── HERO ────────── */
.hero {
  position: relative;
  padding-top: clamp(40px, 6vw, 72px);
  padding-bottom: clamp(56px, 8vw, 96px);
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute;
  top: -200px; right: -200px;
  width: 700px; height: 700px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(120,90,255,0.08) 0%, rgba(120,90,255,0) 60%);
  pointer-events: none;
}
.hero-grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: clamp(40px, 6vw, 80px);
  align-items: center;
}
@media (max-width: 960px) { .hero-grid { grid-template-columns: 1fr; } }
.hero-copy { max-width: 620px; }
.hero-copy h1 { margin-top: 20px; }
.hero-copy p.lede {
  margin-top: 24px;
  max-width: 540px;
}
.hero-ctas { margin-top: 36px; display: flex; gap: 12px; flex-wrap: wrap; }
.hero-trust {
  margin-top: 40px;
  display: flex; gap: 28px; flex-wrap: wrap;
  font-size: 13px; color: var(--subtle);
}
.hero-trust span {
  display: inline-flex; align-items: center; gap: 8px;
}
.hero-trust .tick {
  width: 16px; height: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 999px;
  background: var(--purple-tint);
  color: var(--purple);
}

/* ── Reserves preview card (hero right side) ── */
.reserves-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  position: relative;
}
.reserves-card-head {
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.reserves-card-title {
  font-size: 13px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.005em;
  display: inline-flex; align-items: center; gap: 10px;
}
.reserves-card-title .tag {
  font-size: 10px; font-weight: 600;
  background: var(--purple-soft);
  color: var(--purple);
  padding: 2px 8px;
  border-radius: 4px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.reserves-card-meta {
  font-size: 12px; color: var(--subtle);
  display: inline-flex; align-items: center; gap: 6px;
}
.reserves-peg {
  padding: 28px 24px 20px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 12px;
  align-items: center;
}
.peg-side .lbl {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--subtle);
  font-weight: 600; margin-bottom: 8px;
}
.peg-side .val {
  font-size: 30px; letter-spacing: -0.035em;
  font-weight: 500; color: var(--ink);
  display: flex; align-items: baseline; gap: 4px;
}
.peg-side .val .sym { color: var(--purple); font-weight: 600; }
.peg-equals {
  width: 32px; height: 32px;
  border-radius: 999px;
  background: var(--ink);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500;
}
.reserves-bars {
  padding: 0 24px 20px;
}
.reserves-row {

}

}
.reserves-row-r { color: var(--ink); font-weight: 500; font-variant-numeric: tabular-nums; }
.reserves-foot {

}

}

/* ────────── PARTNER STRIP ────────── */

  background: var(--bg-tint);
}
.partner-strip-label {
  text-align: center;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--subtle);
  font-weight: 500;
  margin-bottom: 28px;
}
.partner-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(24px, 4vw, 64px);
  align-items: center;
  justify-items: center;

  margin: 0 auto;
}

}
.partner {

  align-items: center;
  gap: 10px;
  font-weight: 600; font-size: 17px;
  color: var(--ink); opacity: 0.7;

}
.partner:hover { opacity: 1; color: var(--ink); }
.partner-mark {
  width: 26px; height: 26px;

}

@media (max-width: 520px) {
  .partner-name { display: none; }
  .partner-mark { width: 30px; height: 30px; }
}

/* ────────── TRUST GRID (Built for) ────────── */
.trust-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 48px;
}
@media (max-width: 900px) { .trust-grid { grid-template-columns: 1fr; } }
.trust-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex; flex-direction: column;
  min-height: 360px;
  transition: border-color var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
}
.trust-card:hover {
  border-color: var(--purple-border);
  box-shadow: var(--shadow-sm);
}
.trust-art {
  height: 180px;
  margin: -12px -12px 24px;
  border-radius: var(--r-lg);
  background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.trust-card h3 {
  font-size: 20px; font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--ink); margin: 0 0 8px;
}
.trust-card p {
  font-size: 14px; line-height: 1.55;
  color: var(--muted); margin: 0;
  flex: 1;
}
.trust-card .trust-meta {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--subtle);
  display: flex; justify-content: space-between;
}
.trust-card .trust-meta strong { color: var(--ink); font-weight: 500; }

/* ────────── HOW IT WORKS ────────── */
.how-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 48px;
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  background: var(--white);
}
@media (max-width: 900px) { .how-grid { grid-template-columns: 1fr; } }
.how-step {
  padding: 32px 28px;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--line);
  position: relative;
}
.how-step:last-child { border-right: none; }
@media (max-width: 900px) {
  .how-step { border-right: none; border-bottom: 1px solid var(--line); }
  .how-step:last-child { border-bottom: none; }
}
.how-num {
  font-size: 12px; font-weight: 600;
  color: var(--purple);
  letter-spacing: 0.06em;
  margin-bottom: 16px;
  display: inline-flex; align-items: center; gap: 8px;
}
.how-num::before {
  content: "";
  width: 24px; height: 24px;
  border-radius: 6px;
  background: var(--purple-soft);
  border: 1px solid var(--purple-border);
  display: inline-flex;
}
.how-art {
  height: 140px; margin-bottom: 24px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-tint);
  border-radius: var(--r-md);
  overflow: hidden;
}
.how-step h3 {
  font-size: 18px; font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0 0 8px;
  color: var(--ink);
}
.how-step p {
  font-size: 14px; line-height: 1.55;
  color: var(--muted); margin: 0;
}

/* ────────── RESERVES SECTION ────────── */
.rsv-grid {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: clamp(40px, 5vw, 72px);
  align-items: start;
}
@media (max-width: 960px) { .rsv-grid { grid-template-columns: 1fr; } }
.rsv-detail {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.rsv-detail-head {
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.rsv-detail-head h4 {
  margin: 0; font-size: 14px; font-weight: 500;
}
.rsv-detail-body {
  padding: 28px 24px;
}
.rsv-supply {
  font-size: clamp(36px, 4.6vw, 56px);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 1; color: var(--ink);
  display: flex; align-items: baseline; gap: 4px;
}
.rsv-supply .sym { color: var(--purple); font-weight: 600; }
.rsv-meta {
  margin-top: 12px;
  font-size: 13px;
  color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.rsv-meta .badge {
  font-size: 11px; font-weight: 600;
  background: rgba(22,163,74,0.1);

}

.rsv-chart {
  margin-top: 24px;
  height: 200px;
  position: relative;
}
.rsv-chart svg { width: 100%; height: 100%; }

.rsv-axis {
  display: flex; justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: var(--subtle);
  font-variant-numeric: tabular-nums;
}

.rsv-breakdown {
  border-top: 1px solid var(--line);
  margin-top: 8px;
  padding: 16px 24px 4px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.rsv-stat-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--subtle);
  font-weight: 600; margin-bottom: 4px;
}
.rsv-stat-value {
  font-size: 18px; font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--ink); font-variant-numeric: tabular-nums;
}

.contract-bar {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--white);
  border: 1px solid var(--line-strong);
  border-radius: var(--r-md);
  padding: 6px 6px 6px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-2);

}

.contract-bar .chain {

  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;

}
.contract-bar .copy-btn {
  background: var(--purple); color: #fff;

  padding: 6px 10px;
  border-radius: 6px;

  display: inline-flex; align-items: center; gap: 4px;

}

/* ── RESERVE PARTNERS ── */
.rsv-partners {
  margin-top: 44px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
}
.rsv-partners-label {
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.12em; color: var(--subtle);
  font-weight: 600; margin-bottom: 18px;
}
.rsv-partners-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px 24px;
}
@media (max-width: 520px) { .rsv-partners-grid { grid-template-columns: 1fr; } }
.rsv-partner {
  display: flex; align-items: center; gap: 12px;
}
.rsv-partner-mark {
  width: 36px; height: 36px;
  border-radius: 8px;
  object-fit: contain;
  background: #fff;
  box-shadow: 0 0 0 1px var(--line);
  flex-shrink: 0;
  padding: 4px;
}
.rsv-partner-name {
  font-size: 14px; font-weight: 500;
  color: var(--ink); letter-spacing: -0.01em;
  line-height: 1.2;
}
.rsv-partner-role {
  font-size: 12px; color: var(--subtle);
  margin-top: 2px;
}

/* ────────── MULTICHAIN ────────── */
.chain-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 48px;
}
@media (max-width: 900px) { .chain-grid { grid-template-columns: 1fr; } }

.chain-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex; flex-direction: column;
  min-height: 280px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--dur) var(--ease-out), background var(--dur) var(--ease-out);
}
.chain-card:hover {
  border-color: rgba(120,90,255,0.5);
  background: rgba(120,90,255,0.06);
}
.chain-card--live {
  border-color: rgba(120,90,255,0.4);
  background: rgba(120,90,255,0.08);
}
.chain-card--live::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;

}

.chain-card-head {
  display: flex; justify-content: space-between; align-items: center;

.chain-status {

}
.chain-status--live {

  color: #4ade80;
  border: 1px solid rgba(22,163,74,0.3);
}
.chain-status--soon {
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.12);
}

.chain-card-body { flex: 1; }
.chain-name {
  font-size: 26px; font-weight: 500;
  letter-spacing: -0.025em;
  color: #fff;
  line-height: 1.1;
}
.chain-tagline {
  font-size: 13px; color: rgba(255,255,255,0.55);
  margin-top: 4px;
}
.chain-card p {
  font-size: 14px; line-height: 1.55;
  color: rgba(255,255,255,0.7);
  margin: 20px 0 0;
}
.chain-card-foot {
  margin-top: 24px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-size: 12px; color: rgba(255,255,255,0.5);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

/* ────────── STATS STRIP ────────── */
.stats-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  background: var(--white);
}
@media (max-width: 760px) { .stats-strip { grid-template-columns: repeat(2, 1fr); } }
.stat-cell {
  padding: 28px 24px;
  border-right: 1px solid var(--line);
}
.stat-cell:last-child { border-right: none; }
@media (max-width: 760px) {
  .stat-cell:nth-child(2) { border-right: none; }
  .stat-cell:nth-child(-n+2) { border-bottom: 1px solid var(--line); }
}
.stat-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--subtle); margin-bottom: 8px;
  font-weight: 600;
}
.stat-value {
  font-weight: 500;
  font-size: clamp(24px, 2.6vw, 34px);
  letter-spacing: -0.03em;
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.stat-delta {
  font-size: 12px; margin-top: 8px;
  color: var(--positive); font-weight: 500;
}

/* ────────── DEVELOPER SECTION ────────── */
.dev-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: clamp(40px, 5vw, 72px);
  align-items: center;
}

.code-window {
  background: #0d0b22;

  box-shadow: var(--shadow-lg);

}
.code-head {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 12px;
}
.code-dots { display: flex; gap: 6px; }
.code-dots i {
  width: 10px; height: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
}
.code-tab {
  font-family: var(--font);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  padding-left: 8px;
  border-left: 1px solid rgba(255,255,255,0.1);
  margin-left: 4px;
}
.code-body {
  padding: 22px 24px;
  font-size: 13px;
  line-height: 1.7;
  color: #e2dffa;
  overflow-x: auto;
}
.code-body .kw { color: #ff7ab6; }
.code-body .fn { color: #8ce4ff; }
.code-body .str { color: #c5f6a8; }
.code-body .num { color: #ffcb6b; }
.code-body .com { color: #6b6890; font-style: italic; }
.code-body .var { color: #c8b8ff; }

/* ────────── FAQ ────────── */
.faq-wrap {
  max-width: 780px;
  margin: 48px auto 0;
}
.faq-item {
  border-bottom: 1px solid var(--line);
  padding: 22px 0;
}
.faq-item:first-child { border-top: 1px solid var(--line); }
.faq-q {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px;
  cursor: pointer;
  font-weight: 500;
  font-size: 17px;
  letter-spacing: -0.015em;
  color: var(--ink);
  background: none; border: none;
  width: 100%; text-align: left;
  padding: 0;
}
.faq-toggle {
  flex-shrink: 0;
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--bg-tint);
  border: 1px solid var(--line);
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  transition: transform var(--dur) var(--ease-out), background var(--dur) var(--ease-out), color var(--dur) var(--ease-out);
}
.faq-item.open .faq-toggle {
  transform: rotate(45deg);
  background: var(--purple); color: #fff; border-color: var(--purple);
}
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height 380ms var(--ease-out), margin 380ms var(--ease-out);
  color: var(--muted);
  font-size: 15px; line-height: 1.6;
  max-width: 68ch;
}

  margin-top: 12px;
}

/* ────────── CTA ────────── */
.cta {
  background: var(--ink);
  color: #fff;
  border-radius: var(--r-xl);

  overflow: hidden;
  margin-block: clamp(72px, 9vw, 120px);
}

  content: "";
  position: absolute;

.cta h2 { color: #fff; max-width: 14ch; }

.cta p {

}
.cta-actions { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
.cta-aside {

.cta-aside-label {
  font-size: 11px; text-transform: uppercase;

}
.cta-aside-value {
  font-size: 32px; font-weight: 500;
  letter-spacing: -0.03em;
  display: flex; align-items: baseline; gap: 4px;
}
.cta-aside-value .sym { color: var(--purple); font-weight: 600; }
.cta-aside-bars {
  margin-top: 18px;
  display: grid; grid-template-columns: repeat(12, 1fr);
  gap: 3px; height: 32px;
}
.cta-aside-bars i {
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
}
.cta-aside-bars i.active { background: var(--purple); }

/* ────────── FOOTER ────────── */
.footer {
  background: var(--white);
  padding-block: 72px 32px;

}
.footer-inner {

  grid-template-columns: 1.6fr repeat(3, 1fr);

.footer-col h4 {

  letter-spacing: 0.12em;
  font-size: 11px;
  font-weight: 600;
  color: var(--subtle);

}
.footer-col a {
  display: block; font-size: 14px;

}

/* ────────── TWEAKS PANEL ────────── */
.tweaks-panel {

  z-index: 100;
  background: var(--white);

}

}
